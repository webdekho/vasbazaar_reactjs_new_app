<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>if (location.protocol !== 'https:' && location.hostname !== 'localhost') location.replace('https:' + location.href.substring(location.protocol.length));</script>
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0B" />
    <meta
      name="description"
      content="VasBazaar - Recharge, pay bills, manage wallet and earn rewards"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VasBazaar" />
    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options must be set via HTTP header, not meta tag. Configure on server. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- CSP should be set via HTTP response header on the server, not in meta tag.
         Meta-tag CSP blocks dev-server WebSocket and causes reload loops. -->
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>VasBazaar</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Initial loading state for PWA - replaced when React mounts -->
      <div id="app-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0B0B0B;color:#fff;font-family:system-ui,-apple-system,sans-serif">
        <img src="/icon-192.png" alt="VasBazaar" width="72" height="72" style="border-radius:16px;margin-bottom:20px" onerror="this.style.display='none'">
        <div style="font-size:18px;font-weight:600;margin-bottom:8px">VasBazaar</div>
        <div style="font-size:13px;color:#888">Loading...</div>
        <div style="margin-top:24px;width:40px;height:40px;border:3px solid #333;border-top-color:#40E0D0;border-radius:50%;animation:spin 1s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
